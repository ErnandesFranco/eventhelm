      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-10-data:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka:4.0.0
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - kafka-4
      - kafka-5
      - kafka-6
      - kafka-7
      - kafka-8
      - kafka-9
      - kafka-10
    command:
      - /bin/sh
      - -lc
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --list >/dev/null 2>&1; do
          echo "Waiting for Kafka..."
          sleep 3
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic orders.created --partitions 3 --replication-factor 3
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic payments.authorized --partitions 3 --replication-factor 3
        echo '{"orderId":"ord-1001","status":"created","total":42.5}' | /opt/kafka/bin/kafka-console-producer.sh --bootstrap-server kafka-1:9092 --topic orders.created

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        EVENTHELM_VERSION: ${EVENTHELM_VERSION:-0.1.0}
        EVENTHELM_BUILD_SHA: ${EVENTHELM_BUILD_SHA:-local}
        EVENTHELM_BUILD_TIME: ${EVENTHELM_BUILD_TIME:-local}
    container_name: eventhelm-api
    depends_on:
      db:
        condition: service_healthy
      kafka-init:
        condition: service_started
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      API_PORT: 8080
      EVENTHELM_AUTH_MODE: dev
      EVENTHELM_CORS_ORIGIN: http://localhost:15173,http://127.0.0.1:15173
      EVENTHELM_COLLECTOR_TOKEN: local-dev-collector-token
      EVENTHELM_DATABASE_URL: postgres://eventhelm:eventhelm-local-password@db:5432/eventhelm
      EVENTHELM_CLUSTERS_JSON: '[{"id":"local","name":"Local Kafka Lab","brokers":["kafka-1:9092","kafka-2:9092","kafka-3:9092","kafka-4:9092","kafka-5:9092","kafka-6:9092","kafka-7:9092","kafka-8:9092","kafka-9:9092","kafka-10:9092"]}]'
    healthcheck:
      test:
        - CMD-SHELL
        - 'node -e "fetch(''http://127.0.0.1:8080/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: eventhelm-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:15173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:18080
    healthcheck:
      test:
        - CMD-SHELL
        - 'node -e "fetch(''http://127.0.0.1:5173'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

