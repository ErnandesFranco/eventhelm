name: eventhelm

services:
  kafka-1:
    image: apache/kafka:4.0.0
    container_name: eventhelm-kafka-1
    ports:
      - "127.0.0.1:19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-1-data:/var/lib/kafka/data

  kafka-2:
    image: apache/kafka:4.0.0
    container_name: eventhelm-kafka-2
    ports:
      - "127.0.0.1:29092:29092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-2-data:/var/lib/kafka/data

  kafka-3:
    image: apache/kafka:4.0.0
    container_name: eventhelm-kafka-3
    ports:
      - "127.0.0.1:39092:39092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:39092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,EXTERNAL://localhost:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-3-data:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka:4.0.0
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    command:
      - /bin/sh
      - -lc
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --list >/dev/null 2>&1; do
          echo "Waiting for Kafka..."
          sleep 3
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic orders.created --partitions 3 --replication-factor 3
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic payments.authorized --partitions 3 --replication-factor 3
        echo '{"orderId":"ord-1001","status":"created","total":42.5}' | /opt/kafka/bin/kafka-console-producer.sh --bootstrap-server kafka-1:9092 --topic orders.created

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: eventhelm-api
    depends_on:
      - kafka-init
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      API_PORT: 8080
      EVENTHELM_AUTH_MODE: dev
      EVENTHELM_CORS_ORIGIN: http://localhost:15173
      EVENTHELM_COLLECTOR_TOKEN: local-dev-collector-token
      EVENTHELM_CLUSTERS_JSON: '[{"id":"local","name":"Local Kafka Lab","brokers":["kafka-1:9092","kafka-2:9092","kafka-3:9092"]}]'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: eventhelm-web
    depends_on:
      - api
    ports:
      - "127.0.0.1:15173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:18080

  collector-1:
    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    container_name: eventhelm-collector-1
    depends_on:
      - api
      - kafka-1
    environment:
      CONTROL_PLANE_URL: http://api:8080
      CLUSTER_ID: local
      BROKER_ID: "1"
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      COLLECTOR_ID: local-broker-1
      BROKER_DATA_PATH: /broker-data
      EVENTHELM_COLLECTOR_TOKEN: local-dev-collector-token
    volumes:
      - kafka-1-data:/broker-data:ro

  collector-2:
    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    container_name: eventhelm-collector-2
    depends_on:
      - api
      - kafka-2
    environment:
      CONTROL_PLANE_URL: http://api:8080
      CLUSTER_ID: local
      BROKER_ID: "2"
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      COLLECTOR_ID: local-broker-2
      BROKER_DATA_PATH: /broker-data
      EVENTHELM_COLLECTOR_TOKEN: local-dev-collector-token
    volumes:
      - kafka-2-data:/broker-data:ro

  collector-3:
    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    container_name: eventhelm-collector-3
    depends_on:
      - api
      - kafka-3
    environment:
      CONTROL_PLANE_URL: http://api:8080
      CLUSTER_ID: local
      BROKER_ID: "3"
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      COLLECTOR_ID: local-broker-3
      BROKER_DATA_PATH: /broker-data
      EVENTHELM_COLLECTOR_TOKEN: local-dev-collector-token
    volumes:
      - kafka-3-data:/broker-data:ro

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
