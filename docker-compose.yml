    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    container_name: eventhelm-collector-1
    depends_on:
      - api
      - kafka-1
    environment:
      CONTROL_PLANE_URL: http://api:8080
      CLUSTER_ID: local
      BROKER_ID: "1"
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9092,kafka-3:9092,kafka-4:9092,kafka-5:9092,kafka-6:9092,kafka-7:9092,kafka-8:9092,kafka-9:9092,kafka-10:9092
      COLLECTOR_ID: local-broker-1
      BROKER_DATA_PATH: /broker-data
      EVENTHELM_COLLECTOR_TOKEN: local-dev-collector-token
    volumes:
